<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="	https://cdn.pixabay.com/photo/2016/10/06/19/03/calculator-1719738_1280.png" rel="icon">
    <link rel="stylesheet" href="Design.css">
</head>
<body>
    <h2>Calculator</h2>
    <main>
        <div>
            <input type="text" name="" id="Value">
        </div>
        <div class="digits">
            <button  >1</button>
            <button>2</button>
            <button >3</button>
            <button >*</button>
            <button  >4</button>
            <button>5</button>
            <button>6</button>
            <button>/</button>
            <button  >7</button>
            <button >8</button>
            <button>9</button>
            <button>%</button>
            <button>+</button>
            <button>0</button>
            <button>-</button>
            <button >=</button>
        </div>
    </main>
   
    <script src="calculation.js"></script>
</body>
</html>
